project:
  type: book
  output-dir: _book
  post-render: scripts/add_cover.py

book:
  title: "Open Handbook: Template"
  subtitle: "A print-friendly Quarto template for the Open Handbook Commons Project"
  author: "Open Handbook Commons (community-authored)"
  date: last-modified
  chapters:
    - index.qmd
    - front-matter/license.qmd
    - front-matter/disclaimers.qmd
    - front-matter/printing.qmd
    - front-matter/preface.qmd
    - part: "Part I Title"
      chapters: 
        - chapters/01-introduction.qmd
    - part: "Part II Title"
      chapters:
        - chapters/02-core-skills.qmd
    - part: "Part III Title"
      chapters:
        - chapters/03-checklists.qmd
    - back-matter/contribute.qmd

format:
  pdf:
    pdf-engine: lualatex
    documentclass: book
    classoption: openany
    papersize: A4
    fontsize: 11pt
    linestretch: 1.2
    geometry:
      - top=20mm
      - bottom=25mm
      - left=30mm
      - right=20mm
    mainfont: LibertinusSerif
    mainfontoptions:
      - Path=fonts/
      - Extension=.ttf
      - UprightFont=*-Regular
      - BoldFont=*-Bold
      - ItalicFont=*-Italic
      - BoldItalicFont=*-BoldItalic
    toc: true
    number-sections: true
    colorlinks: true

ohc:
  cover:
    image: cover/cover-bg.jpg
    logo: cover/logo.png       # optional, can omit
    papersize: A4              # A4 or letter
    overlay_opacity: 0.1      # 0.0 to 0.7 typical
    margin_mm: 25
    title_size: 40
    subtitle_size: 25
    url_text: openhandbook.org # optional

execute:
  echo: false
  #warning: false
  #message: false


